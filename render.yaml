services:
  - type: web
    name: skinsense-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RAG_ENABLED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
